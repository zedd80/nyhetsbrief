# Nyhetsbrief — feedliste.
# Rediger denne fila (GitHubs web-UI eller be Claude); isengard plukker opp
# endringen ved neste kjøring (git pull hvert 30. min).
#
# Felt per feed:
#   name         — vises på siden (må være unik; brukes som nøkkel i state)
#   url          — feed-URL
#   max          — valgfritt, maks saker på siden (default 25)
#   strip_suffix — valgfritt, fjernes fra slutten av titler
#   descriptions — valgfritt, false = aldri ingress for denne kilden
#
# Nivå-inndeling (2026-07-22): primær max=20, sekundær max=10, nisje max=5.
# Rekkefølgen speiler nivåene — viktigst øverst, siden LLM-fetchere
# trunkerer store sider nedenfra. Krympelogikken i generate.py bruker
# min(feedens max, globalt tak).
#
# Alle URL-er verifisert fungerende fra hjemme-IP 2026-07-05 (nye kilder
# 2026-07-22).

# ─── Primær (max 20) ──────────────────────────────────────────────────

[[feeds]]
name = "NRK toppsaker"
url = "https://www.nrk.no/toppsaker.rss"
max = 20

[[feeds]]
name = "NRK siste nytt"
url = "https://www.nrk.no/nyheter/siste.rss"
max = 20

[[feeds]]
name = "VG"
url = "https://www.vg.no/rss/feed"
max = 20

[[feeds]]
name = "BBC World"
url = "https://feeds.bbci.co.uk/news/world/rss.xml"
max = 20

# CNNs RSS er død (siste sak april 2023) — erstattet med Guardian + NYT.
[[feeds]]
name = "The Guardian World"
url = "https://www.theguardian.com/world/rss"
max = 20

[[feeds]]
name = "New York Times World"
url = "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
max = 20

# AP la ned offentlig RSS (apnews.com/index.rss krever betalt avtale,
# verifisert 2026-07-22) — hentes via Google News-proxy som Finansavisen.
# Wire-bredde (~100 saker/døgn), men kun titler; AP-titler er heldigvis
# hele, faktatunge setninger.
[[feeds]]
name = "AP (via Google News)"
url = "https://news.google.com/rss/search?q=site:apnews.com%20when:1d&hl=en-US&gl=US&ceid=US:en"
strip_suffix = " - AP News"
max = 20
descriptions = false  # Google News-sammendrag er bare lenke-HTML

