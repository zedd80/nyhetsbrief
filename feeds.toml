# Nyhetsbrief — feedliste.
# Rediger denne fila (GitHubs web-UI eller be Claude); isengard plukker opp
# endringen ved neste kjøring (git pull hvert 30. min).
#
# Felt per feed:
#   name         — vises på siden (må være unik; brukes som nøkkel i state)
#   url          — feed-URL
#   max          — valgfritt, maks saker på siden (default 25)
#   strip_suffix — valgfritt, fjernes fra slutten av titler
#   descriptions — valgfritt, false = aldri ingress for denne kilden
#
# Linjefordeling (revidert 2026-07-23 etter innspill fra konsumenten,
# Claude Chat): 20/10/5 per kilde. Rekkefølgen er prioritet — viktigst
# øverst, siden LLM-fetchere trunkerer store sider nedenfra. NB: NRK
# toppsaker står FØR NRK siste nytt med vilje — ved NRK-duplikat på tvers
# av de to feedene vinner den første i fila (salienssignalet bevares).
#
# Reuters ble vurdert 2026-07-23 og utgår: all offentlig Reuters-RSS er
# nedlagt (DNS-feil/404/401). Regjeringen.no ble også vurdert: RSS-endepunktet
# ignorerer departementsfilter (kun ufiltrert hele-regjeringen-feed) — droppet.

# ─── Nivå 20 ──────────────────────────────────────────────────────────

[[feeds]]
name = "NRK toppsaker"
url = "https://www.nrk.no/toppsaker.rss"
max = 10

[[feeds]]
name = "NRK siste nytt"
url = "https://www.nrk.no/nyheter/siste.rss"
max = 20

[[feeds]]
