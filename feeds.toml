max = 10

[[feeds]]
name = "E24"
url = "https://e24.no/rss"
max = 10

[[feeds]]
name = "Dagens Næringsliv"
url = "https://services.dn.no/api/feed/rss/"
max = 10

# AP la ned offentlig RSS (apnews.com/index.rss krever betalt avtale,
# verifisert 2026-07-22) — hentes via Google News-proxy. BEHOLDT 2026-07-23
# som eneste wire-kilde (Reuters-RSS er nedlagt) tross to kjente svakheter:
# base64-lenker via news.google.com kan ikke følges av Claude Chats fetcher,
# og enkelte rader er seksjonssider, ikke saker. Titler bærer verdien.
[[feeds]]
name = "AP (via Google News)"
url = "https://news.google.com/rss/search?q=site:apnews.com%20when:1d&hl=en-US&gl=US&ceid=US:en"
strip_suffix = " - AP News"
max = 10
descriptions = false  # Google News-sammendrag er bare lenke-HTML

[[feeds]]
name = "The Guardian World"
url = "https://www.theguardian.com/world/rss"
max = 10

# Høyre-motvekt i kvalitetssjiktet (mot Guardian/NYT); åpen feed med
